  restaurant_analysis : |
    You are a feedback analyst. You need to analyze the customer's feedback or conversation.

    Review_conversation: "{chat_history}"

    Perform the following tasks:

    1. Provide review rating ob basis of whole feedback
                            
    2. Extract feedback and rate it (1-5) for each of these variables:
    - service
    - food
    - menu
    - staff
    - ambiance
    - pricing
    - wait time
    - cleanliness/hygiene
    - others (miscellaneous points)

    3. Summarize the full review in detail.

    4. Identify the **emotion** behind the feedback. Choose from: happy, satisfied, neutral, angry, frustrated, disgusted.

    5. Estimate the **Net Promoter Score (NPS)** — a number between 0 and 10 — based solely on the tone, sentiment, and content of the user's feedback. 
    - 9-10 = Promoter (strongly positive)
    - 7-8 = Passive (somewhat satisfied, but not enthusiastic)
    - 0-6 = Detractor (dissatisfied or critical)

